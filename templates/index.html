<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusDrop 最終版</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 用戶列表 */
        .peer-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .peer-item:last-child { border-bottom: none; }
        .btn-connect { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
        .btn-connect:hover { background: #218838; }
        
        /* 聊天視窗 */
        #chat_log { height: 350px; overflow-y: scroll; border: 1px solid #ddd; padding: 15px; margin-top:15px; background:#fff; border-radius: 8px; }
        .message { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
        .my-message { background: #007bff; color: white; float: right; clear: both; }
        .other-message { background: #e9ecef; color: #333; float: left; clear: both; }
        .sys-message { text-align: center; color: #888; font-size: 0.85em; clear: both; margin: 5px 0; }
        
        /* 檔案區塊 (預設隱藏) */
        #file_area { margin-top:15px; background:#e8f5e9; padding:15px; border-radius: 8px; border: 1px solid #c3e6cb; display:none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">📡 CampusDrop <small style="font-size:0.5em; color:#666;">Cloud v2</small></h2>

    <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-bottom:15px; display:flex; gap:10px;">
        <input type="text" id="my_name" placeholder="輸入暱稱" style="flex-grow:1; padding:8px; border:1px solid #ddd; border-radius:4px;">
        <button onclick="updateName()" style="padding:8px 15px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">設定暱稱</button>
    </div>
    <div style="text-align:right; font-size:0.8em; color:#666;">我的 UID: <span id="display_uid">...</span></div>

    <hr>

    <h3>👥 在線同學 (<span id="count">0</span>)</h3>
    <div id="peer_list"></div>

    <div id="file_area">
        <h4 style="margin:0 0 10px 0;">📂 P2P 檔案傳輸通道 (已連線)</h4>
        <p>正在與 <strong id="target_peer_name" style="color:#28a745;"></strong> 連線中</p>
        <div style="display:flex; gap:10px;">
            <input type="file" id="file_input" style="flex-grow:1;">
            <button onclick="sendFile()" style="background:#28a745; color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer;">傳送</button>
        </div>
        <div id="transfer_status" style="margin-top:10px; font-weight:bold; color:#555;"></div>
    </div>

    <hr>

    <div id="chat_log"></div>
    <div style="margin-top:10px; display:flex; gap:5px;">
        <input type="text" id="chat_input" placeholder="輸入訊息..." style="flex-grow:1; padding:10px; border:1px solid #ddd; border-radius:4px;">
        <button onclick="sendChat()" style="background:#007bff; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">發送</button>
    </div>
</div>

<script>
    const socket = io();
    
    // --- UID 與 名稱處理 ---
    function getUniqueUID() {
        let uid = localStorage.getItem('campus_uid');
        if (!uid) {
            uid = Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('campus_uid', uid);
        }
        return uid;
    }
    const MY_UID = getUniqueUID();
    document.getElementById('display_uid').textContent = MY_UID;
    
    let myName = localStorage.getItem('campus_name') || '同學' + Math.floor(Math.random()*100);
    document.getElementById('my_name').value = myName;

    function updateName() {
        myName = document.getElementById('my_name').value;
        localStorage.setItem('campus_name', myName);
        socket.emit('join', { uid: MY_UID, name: myName });
        alert('暱稱已更新！');
    }

    // --- Socket 事件 ---
    socket.on('connect', () => {
        console.log('Connected to Server');
        socket.emit('join', { uid: MY_UID, name: myName });
    });

    socket.on('update_user_list', (users) => {
        const list = document.getElementById('peer_list');
        const others = users.filter(u => u.uid !== MY_UID);
        document.getElementById('count').textContent = others.length;
        
        if(others.length === 0) {
            list.innerHTML = '<div style="color:#999; text-align:center; padding:10px;">附近沒人...找個同學一起開網頁測試吧！</div>';
        } else {
            list.innerHTML = others.map(u => `
                <div class="peer-item">
                    <div><strong>${u.name}</strong> <small style="color:#888;">#${u.uid}</small></div>
                    ${PEER_CONNECTIONS[u.uid] ? 
                        '<span style="color:green; font-weight:bold;">🔗 已連線</span>' : 
                        `<button class="btn-connect" onclick="startP2P('${u.uid}', '${u.name}')">發起連線</button>`
                    }
                </div>
            `).join('');
        }
    });

    // 接收聊天 (修正：顯示名字)
    socket.on('group_chat', (data) => {
        // data.sender_name 是我們在後端新加的
        appendMsg(data.sender_name, data.content, false);
    });

    function sendChat() {
        const txt = document.getElementById('chat_input').value;
        if(!txt) return;
        socket.emit('group_chat', { sender_uid: MY_UID, content: txt });
        appendMsg('我', txt, true);
        document.getElementById('chat_input').value = '';
    }

    function appendMsg(name, txt, isMe, isSys=false) {
        const log = document.getElementById('chat_log');
        if (isSys) {
            log.innerHTML += `<div class="sys-message">${txt}</div>`;
        } else {
            log.innerHTML += `<div class="message ${isMe ? 'my-message' : 'other-message'}">
                <small style="opacity:0.8;">${name}</small><br>${txt}
            </div><div style="clear:both;"></div>`;
        }
        log.scrollTop = log.scrollHeight;
    }

    // --- WebRTC P2P 核心 (附帶詳細狀態顯示) ---
    const PEER_CONNECTIONS = {};
    const DATA_CHANNELS = {};
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startP2P(targetUid, targetName) {
        appendMsg('系統', `正在呼叫 ${targetName} 建立 P2P 連線...`, false, true);
        
        const pc = new RTCPeerConnection(rtcConfig);
        PEER_CONNECTIONS[targetUid] = pc;

        // 監聽連線狀態
        pc.oniceconnectionstatechange = () => {
            console.log(`ICE State: ${pc.iceConnectionState}`);
            if (pc.iceConnectionState === 'connected') {
                 appendMsg('系統', `與 ${targetName} 的 P2P 通道已打通！`, false, true);
            }
        };

        const dc = pc.createDataChannel("file");
        setupDataChannel(dc, targetUid, targetName);

        pc.onicecandidate = e => {
            if(e.candidate) socket.emit('p2p_signal', { type: 'ice', target_uid: targetUid, sender_uid: MY_UID, candidate: e.candidate });
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('p2p_signal', { type: 'offer', target_uid: targetUid, sender_uid: MY_UID, sdp: offer });
    }

    socket.on('p2p_signal', async (data) => {
        const sender = data.sender_uid;
        // 嘗試從列表中找名字，找不到就用 UID
        let senderName = sender; 
        // 這裡偷懶直接顯示 UID，正式版可以去 user list 查
        
        if(!PEER_CONNECTIONS[sender]) {
            appendMsg('系統', `收到來自 ${sender} 的連線請求...`, false, true);
            const pc = new RTCPeerConnection(rtcConfig);
            PEER_CONNECTIONS[sender] = pc;
            
            pc.ondatachannel = e => setupDataChannel(e.channel, sender, sender);
            
            pc.onicecandidate = e => {
                if(e.candidate) socket.emit('p2p_signal', { type: 'ice', target_uid: sender, sender_uid: MY_UID, candidate: e.candidate });
            };
        }
        
        const pc = PEER_CONNECTIONS[sender];
        try {
            if(data.type === 'offer') {
                await pc.setRemoteDescription(data.sdp);
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('p2p_signal', { type: 'answer', target_uid: sender, sender_uid: MY_UID, sdp: answer });
            } else if(data.type === 'answer') {
                await pc.setRemoteDescription(data.sdp);
            } else if(data.type === 'ice') {
                await pc.addIceCandidate(data.candidate);
            }
        } catch(e) { console.error(e); }
    });

    function setupDataChannel(dc, uid, name) {
        DATA_CHANNELS[uid] = dc;
        dc.onopen = () => {
            appendMsg('系統', `✅ 檔案傳輸通道就緒！`, false, true);
            // 顯示檔案區塊
            const fileArea = document.getElementById('file_area');
            fileArea.style.display = 'block';
            document.getElementById('target_peer_name').innerText = name || uid;
            
            // 讓列表按鈕變色
            socket.emit('join', { uid: MY_UID, name: myName }); // 觸發列表刷新
        };
        dc.onmessage = handleFileMessage;
    }

    // --- 檔案傳輸 ---
    function sendFile() {
        const file = document.getElementById('file_input').files[0];
        if(!file) return alert('請選擇檔案');
        
        const targetUid = Object.keys(DATA_CHANNELS)[0]; // Demo: 傳給第一個連線的人
        const dc = DATA_CHANNELS[targetUid];
        
        if(dc.readyState !== 'open') return alert('連線尚未準備好');

        dc.send(JSON.stringify({ type: 'meta', name: file.name, size: file.size }));
        const reader = new FileReader();
        reader.onload = () => {
            dc.send(reader.result);
            document.getElementById('transfer_status').innerText = `✅ ${file.name} 發送完成`;
            appendMsg('我', `發送檔案: ${file.name}`, true);
        };
        reader.readAsArrayBuffer(file);
    }

    let incomingMeta = null;
    function handleFileMessage(e) {
        const data = e.data;
        if(typeof data === 'string') {
            const msg = JSON.parse(data);
            if(msg.type === 'meta') {
                incomingMeta = msg;
                document.getElementById('transfer_status').innerText = `正在接收 ${msg.name}...`;
            }
        } else {
            const blob = new Blob([data]);
            const url = URL.createObjectURL(blob);
            appendMsg('對方', `📥 傳送了檔案: <a href="${url}" download="${incomingMeta.name}" style="font-weight:bold;">${incomingMeta.name}</a>`, false);
            document.getElementById('transfer_status').innerText = `✅ ${incomingMeta.name} 接收完成`;
        }
    }
</script>

</body>
</html>
